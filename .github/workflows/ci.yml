name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # lunes 06:00 UTC — chequeo semanal de links (lychee)

permissions:
  contents: read

jobs:
  validate:
    name: validate (frontmatter + wikilinks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Validar vault
        run: python scripts/validate.py

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "vault/**/*.md README.md"

  quartz:
    name: quartz build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Clonar Quartz
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git .quartz-build
      - name: Preparar contenido
        run: |
          rm -rf .quartz-build/content
          cp -r vault .quartz-build/content
      - name: Build
        working-directory: .quartz-build
        run: |
          npm ci
          npx quartz build

  links:
    name: lychee (link check semanal)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose vault/**/*.md README.md
          fail: true
